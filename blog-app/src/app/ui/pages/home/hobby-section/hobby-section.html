<section class="hobby container">
  <h2 class="hobby__title">Hobby projects</h2>
  <p class="hobby__sub">Duis nisi do exercitation in iure aliqua commodo nisi eu id reprehenderit dolore fugiat consectetur iure labore ad ea.</p>
  <div class="hobby__grid">
    @for (item of hobbyItems; track item.title) {
      <div class="hobby__card">
        @if (item.img) {
          <img [src]="item.img" [alt]="item.title" />
        }
        <div class="hobby__overlay">
          <span>{{ item.title }}</span>
          <p>{{ item.desc }}</p>
        </div>
      </div>
    }
  </div>
</section>
