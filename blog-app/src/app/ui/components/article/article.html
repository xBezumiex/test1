<li class="blog-card">
  <div class="blog-card__actions">
    <button class="blog-card__edit" title="Редактировать" (click)="onEdit()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </button>
    <button class="blog-card__delete" title="Удалить" (click)="onDelete()">✕</button>
  </div>
  <div class="blog-card__img"></div>
  <h3 class="blog-card__title">{{ article().title }}</h3>
  <span class="blog-card__date">{{ article().date }}</span>
</li>
